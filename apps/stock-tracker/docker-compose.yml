services:
  stocktracker-backend:
    image: 192.168.1.192:5000/stock-tracker-backend:latest
    container_name: stocktracker-backend
    restart: unless-stopped
    volumes:
      - stocktracker-data:/app/data
    environment:
      - TZ=Europe/Paris
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - front

  stocktracker-frontend:
    image: 192.168.1.192:5000/stock-tracker-frontend:latest
    container_name: stocktracker-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - TZ=Europe/Paris
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - front

volumes:
  stocktracker-data:

networks:
    front:
        external: true
        name: front

