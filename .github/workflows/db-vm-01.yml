name: Deploy (only on db-vm-01)

on:
  push:
    branches: [ "main" ]
    paths:
      - "ops/deploy/db-vm-01.sh"
      - "shared/mariadb/**"
      - ".github/workflows/db-vm-01.yml"  # Trigger db-vm-01 deploy if db changes (optional)

jobs:
  deploy:
    # Target a specific self-hosted runner by label
    runs-on: [ self-hosted, linux, x64, db-vm-01 ]
    steps:
      - name: Deploy db-vm-01
        run: |
          cd /srv/docker-apps-infra
          pwd
          git pull
          ls -la
          cp ops/deploy/db-vm-01.sh . -f
          chmod +x db-vm-01.sh
          ./db-vm-01.sh

