name: Deploy (only on app-vm-01)

on:
  push:
    branches: [ "main" ]
    paths:
      - "deploy/app-vm-01.sh"
      - "apps/**"
      - ".github/workflows/app-vm-01.yml"  # Trigger app-vm-01 deploy if db changes (optional)

jobs:
  deploy:
    # Target a specific self-hosted runner by label
    runs-on: [ self-hosted, linux, x64, app-vm-01 ]
    steps:
      - name: Prepare deployment to app-vm-01
        run: |
          cd /srv/docker-apps-infra
          pwd
          git pull
          ls -la
          cp deploy/app-vm-01.sh . -f
          chmod +x app-vm-01.sh

      - name: Deploy app-vm-01
        run: |
          cd /srv/docker-apps-infra
          ./app-vm-01.sh
