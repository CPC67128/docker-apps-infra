name: Deploy (only on app-vm-01)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # Target a specific self-hosted runner by label
    runs-on: [ self-hosted, linux, x64, app-vm-01 ]
    steps:
      - name: Checkout (root files only)
        uses: actions/checkout@v4
        with:
          # Sparse checkout to only bring root-level files
          sparse-checkout: |
            /*
          sparse-checkout-cone-mode: false

      - name: Show checked-out files
        run: |
          pwd
          ls -la

      - name: Deploy apps
        run: |
          cd ops/deploy
          chmod +x app-vm-01.sh
          ./app-vm-01.sh

